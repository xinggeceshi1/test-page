<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性格测试</title>

<style>
body {
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:linear-gradient(180deg,#fff,#f5f5f5);
    padding:20px;
}

/* 卡片 */
.box {
    background:white;
    padding:25px;
    border-radius:16px;
    max-width:500px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* 标题 */
h1 {
    text-align:center;
    color:#ff3b30;
    font-size:24px;
}

/* 情绪文案 */
.desc {
    text-align:center;
    color:#666;
    font-size:14px;
    margin-top:8px;
}

/* 问题 */
.question {
    margin-top:25px;
    font-size:15px;
}

/* 选项 */
label {
    display:block;
    padding:12px;
    background:#f7f7f7;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
}

/* 按钮 */
.btn {
    background:#ff3b30;
    color:white;
    padding:16px;
    border-radius:12px;
    text-align:center;
    margin-top:25px;
    font-size:16px;
}

/* 底部暗示 */
.hint {
    text-align:center;
    font-size:12px;
    color:#999;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>你的真实人格，可能和你想的不一样</h1>
<p class="desc">90%的人从未真正了解自己</p>

<div class="question">
<p>1. 当你一个人时，你更常？</p>
<label><input type="radio" name="q1" value="A"> 思考人生、分析自己</label>
<label><input type="radio" name="q1" value="B"> 刷视频、放松自己</label>
</div>

<div class="question">
<p>2. 面对重要选择，你通常？</p>
<label><input type="radio" name="q2" value="A"> 深思熟虑，反复权衡</label>
<label><input type="radio" name="q2" value="B"> 凭感觉，快速决定</label>
</div>

<div class="btn" onclick="goPay()">查看我的深层人格 →</div>

<div class="hint">已有 1,582,394 人测试</div>

</div>

<script>
function goPay(){
    let q1 = document.querySelector('input[name="q1"]:checked');
    let q2 = document.querySelector('input[name="q2"]:checked');

    if(!q1 || !q2){
        alert("请完成测试");
        return;
    }

    let scoreA = 0;

    if(q1.value === "A") scoreA++;
    if(q2.value === "A") scoreA++;

    let result = "";

    if(scoreA >= 1){
        result = "你属于：洞察型人格";
    }else{
        result = "你属于：行动型人格";
    }

    localStorage.setItem("userType", result);

    window.location.href = "pay.html";
}
</script>

</body>
</html>
