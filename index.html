<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>性格天赋深度测试（20题）</title>

<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:linear-gradient(180deg,#ffffff,#f4f6f9);
    margin:0;
}

/* 主容器 */
.container{
    max-width:750px;
    margin:20px auto;
    background:#fff;
    padding:25px;
    border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* 标题 */
h1{
    text-align:center;
    font-size:22px;
}

/* 副标题 */
.sub{
    text-align:center;
    color:#999;
    font-size:13px;
}

/* 问题卡片 */
.question{
    margin:20px 0;
    padding:15px;
    border-radius:12px;
    background:#fafafa;
    border:1px solid #eee;
}

/* 选项 */
.option{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    background:#f1f1f1;
    cursor:pointer;
    transition:0.2s;
}

/* hover效果 */
.option:hover{
    background:#ffeaea;
}

/* 按钮 */
button{
    padding:14px;
    background:#ff3b30;
    color:#fff;
    border:none;
    border-radius:12px;
    font-size:16px;
    width:100%;
    margin-top:20px;
}

/* 结果区 */
.result{
    display:none;
    margin-top:25px;
}

/* 情绪钩子 */
.hook{
    margin-top:15px;
    padding:15px;
    background:#ffeaea;
    border-radius:10px;
}

/* 支付卡片 */
.pay{
    background:#fff3cd;
    padding:15px;
    border-radius:12px;
    margin-top:20px;
}

/* 小提示 */
.small{
    font-size:12px;
    color:gray;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>性格天赋深度测试（20题）</h1>
<p class="sub">已有 52871 人完成测试 · 准确率高达93%</p>

<div id="questions"></div>

<button onclick="showResult()">查看结果</button>

<div class="result" id="result">

<h2>你的性格类型：</h2>
<p id="resultText" style="font-size:18px;font-weight:bold"></p>

<div class="hook">
<p id="hookText" style="font-weight:bold;color:#d9534f"></p>
</div>

<div class="pay">
<p>🔒 你的【天赋赚钱潜力报告】已生成（限时可查看）</p>

<ul>
<li>✔ 你真正适合的赚钱路径（90%的人选错）</li>
<li>✔ 你的隐藏优势如何变现</li>
<li>✔ 你未来3年的关键机会点</li>
<li>✔ 哪种选择会让你收入翻倍</li>
</ul>

<button onclick="goPay()">立即解锁完整报告（9.9元）</button>

<p class="small">已有 1327 人刚刚解锁</p>

</div>
</div>

</div>

<script>

/* 题目（完全没动） */
const questions=[
["你更容易提前规划好事情","更习惯顺其自然"],
["遇到问题你更倾向自己解决","找人一起讨论"],
["空闲时间你更喜欢一个人待着","和别人一起活动"],
["做决定时你更看重逻辑分析","依赖内心感觉"],
["你更讨厌混乱无序","被规则限制"],
["你更擅长分析问题","表达想法"],
["面对机会你更愿意先评估","先尝试"],
["你更相信数据逻辑","直觉判断"],
["做事更倾向稳定推进","灵活变化"],
["你更在意把事情做对","让别人满意"],
["赚钱你更倾向靠能力","靠机会人脉"],
["你更容易长期坚持一件事","不断尝试新方向"],
["你更适合深度专精","多方向发展"],
["面对压力你更独自承受","寻求帮助"],
["你更希望稳定收入","高回报机会"],
["别人更觉得你理性冷静","情绪丰富"],
["你更容易被明确目标吸引","有趣感觉吸引"],
["你更害怕失败","害怕错过"],
["你更倾向掌控局面","顺其自然"],
["你更希望被认可能力","被理解情绪"]
];

const container=document.getElementById("questions");

/* 渲染题目 */
questions.forEach((q,i)=>{
container.innerHTML+=`<div class="question">
<p>${i+1}. 请选择更符合你的描述：</p>
<label class="option"><input type="radio" name="q${i}" value="A"> ${q[0]}</label>
<label class="option"><input type="radio" name="q${i}" value="B"> ${q[1]}</label>
</div>`;
});

/* 计算结果 */
function showResult(){
let score=0;

for(let i=0;i<questions.length;i++){
let ans=document.querySelector(\`input[name="q\${i}"]:checked\`);
if(!ans){alert("请完成所有题目");return}
if(ans.value==='A')score++;
}

let result="";
let hook="";

if(score>=14){
result="【掌控型天赋人格】你具备强逻辑与决策能力";
hook="你具备明显的赚钱优势，但如果方向选错，反而更容易被困在高强度低回报的路径里。";
}else if(score>=8){
result="【均衡成长型人格】你适应力极强";
hook="你的潜力很大，但目前还没有完全被激活，很多机会其实被你错过了。";
}else{
result="【感知型创造人格】你拥有强感知与表达能力";
hook="你天生具备变现能力，但大多数人会误以为这是‘不稳定’，从而错失机会。";
}

document.getElementById("resultText").innerText=result;
document.getElementById("hookText").innerText=hook;
document.getElementById("result").style.display="block";
}

/* ✅ 修复跳转 */
function goPay(){
window.location.href="pay.html";
}

</script>

</body>
</html>
